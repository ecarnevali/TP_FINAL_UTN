<select 
  [value]="value" 
  (change)="onSelectChange($event)" 
  (blur)="onTouched()"
  [ngClass]="{'input-error': hasError}">
  
  <option value="" disabled selected>Seleccione un estado...</option>
  <option *ngFor="let estado of listaEstados" [value]="estado.id">
    {{ estado.nombre }}
  </option>
</select>
